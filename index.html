<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <!-- ========================================
       FAVICON / BRAND ICONS
  ========================================= -->

  <!-- Modern browsers -->
  <link
    rel="icon"
    type="image/svg+xml"
    href="/favicon.svg"
  />

  <!-- Browser fallback -->
  <link
    rel="icon"
    type="image/x-icon"
    href="/favicon.ico"
  />

  <!-- 32 × 32 PNG fallback -->
  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="/favicon-32.png"
  />

  <!-- Apple / iPhone / iPad -->
  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="/apple-touch-icon.png"
  />

  <!-- Browser / mobile theme -->
  <meta
    name="theme-color"
    content="#0f0f0f"
  />


  <!-- ========================================
       VIEWPORT
  ========================================= -->

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />


  <!-- ========================================
       SEO
  ========================================= -->

  <title>
    Rohit Ohal Photography
  </title>

  <meta
    name="description"
    content="Luxury Wedding Photographer based in Pune, India. Capturing timeless wedding stories across India and worldwide."
  />


  <!-- ========================================
       GOOGLE FONTS
  ========================================= -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

</head>


<body>

  <div id="root"></div>


  <!-- ========================================
       CLOUDINARY UPLOAD WIDGET
  ========================================= -->

  <script
    src="https://upload-widget.cloudinary.com/global/all.js"
    type="text/javascript">
  </script>


  <!-- ========================================
       REACT APPLICATION
  ========================================= -->

  <script
    type="module"
    src="/src/main.jsx">
  </script>

</body>

</html>
